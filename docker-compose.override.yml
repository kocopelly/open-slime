services:
  anthropic-proxy:
    image: nginx:alpine
    env_file: .env.proxy
    volumes:
      - ./nginx/anthropic-proxy.conf.template:/etc/nginx/templates/default.conf.template:ro,z
    expose:
      - "8080"
    restart: unless-stopped

  proton-bridge:
    image: syphr/proton-bridge:latest
    env_file: .env.bridge
    volumes:
      - proton-bridge-config:/root/.config/protonmail/bridge
      - proton-bridge-pass:/root/.password-store
      - proton-bridge-cache:/root/.cache/protonmail/bridge
      - /etc/pki/tls/certs/ca-bundle.crt:/etc/ssl/certs/ca-certificates.crt:ro
    restart: unless-stopped
    command: ["--noninteractive"]

  email-api:
    build: ./services/email-api
    env_file: .env.email
    depends_on:
      - proton-bridge
    expose:
      - "3001"
    restart: unless-stopped

  gdrive:
    image: rclone/rclone:latest
    volumes:
      - ./services/gdrive/rclone.conf.template:/config/rclone.conf.template:ro
      - ./services/gdrive/entrypoint.sh:/entrypoint.sh:ro
      - ${OPENCLAW_CONFIG_DIR}/secrets/google-service-account.json:/config/service-account.json:ro
      - gdrive-data:/data:shared
      - gdrive-cache:/root/.cache/rclone
    environment:
      GDRIVE_ROOT_FOLDER_ID: ${GDRIVE_ROOT_FOLDER_ID:-}
    entrypoint: ["/entrypoint.sh"]
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
    restart: unless-stopped

  openclaw-gateway:
    depends_on:
      - anthropic-proxy
      - email-api
      - gdrive
    entrypoint: ["/home/node/.openclaw/scripts/entrypoint-wrapper.sh"]
    command: ["node", "dist/index.js", "gateway", "--bind", "${OPENCLAW_GATEWAY_BIND:-lan}", "--port", "18789"]
    ports:
      - "${AGENT_PORT_1:-18081}:18081"
      - "${AGENT_PORT_2:-18082}:18082"
      - "${AGENT_PORT_3:-18083}:18083"
      - "${AGENT_PORT_4:-18084}:18084"
    environment:
      ANTHROPIC_API_KEY: ${DUMMY_ANTHROPIC_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      GH_TOKEN: ${GH_TOKEN}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      PATH: /home/node/.openclaw/bin:/root/.bun/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.ssh:/home/node/.ssh:z
      - gdrive-data:/home/node/.openclaw/workspace/gdrive:shared
    group_add:
      - "${DOCKER_GID:-970}"

  chromium:
    image: browserless/chrome
    ports:
      - "18800:3000"
    environment:
      CONNECTION_TIMEOUT: 600000
    restart: unless-stopped

  openclaw-cli:
    environment:
      ANTHROPIC_API_KEY: ${DUMMY_ANTHROPIC_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}

volumes:
  proton-bridge-config:
  proton-bridge-pass:
  proton-bridge-cache:
  gdrive-data:
  gdrive-cache:
